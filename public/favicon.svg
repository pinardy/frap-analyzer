<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0f1216"/>
  <g fill="none" stroke="#e8eef5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- base -->
    <path d="M16 53 H40"/>
    <!-- vertical support from base to stage -->
    <path d="M23 53 V44"/>
    <!-- stage -->
    <path d="M15 44 H37"/>
    <!-- arm (C-curve) from base up and over -->
    <path d="M34 53 C44 48 44 30 34 26"/>
    <!-- body tube toward eyepiece -->
    <path d="M30 30 L40 16"/>
    <!-- objective pointing to the sample -->
    <path d="M27 33 L23 42"/>
  </g>
  <!-- eyepiece knob -->
  <circle cx="41" cy="14" r="3.5" fill="#e8eef5"/>
  <!-- laser beam hitting the sample on the stage -->
  <line x1="9" y1="12" x2="23" y2="43" stroke="#22e04a" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="23" cy="44" r="5.5" fill="#22e04a" opacity="0.35"/>
  <circle cx="23" cy="44" r="2.6" fill="#b6ffc4"/>
</svg>
